name: AI Test Generator CI

permissions:
  contents: write

on:
  push:
    branches:
      - '**'

  pull_request:
    branches:
      - main

jobs:
  e2e-test:

    runs-on: ubuntu-latest

    steps:

      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # Setup node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend dependencies
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      # Frontend dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      # Automation dependencies
      - name: Install Automation Dependencies
        working-directory: ./automation
        run: npm ci

      # Install Playwright browsers
      - name: Install Playwright Browsers
        working-directory: ./automation
        run: npx playwright install --with-deps

      # Start backend
      - name: Start Backend
        working-directory: ./backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run dev &

      # Start frontend
      - name: Start Frontend
        working-directory: ./frontend
        run: npm run dev &

      # Wait for applications
      - name: Wait for Applications
        run: |
          npx wait-on http://localhost:5000
          npx wait-on http://localhost:5173

      # Run Playwright tests
      - name: Run Playwright Tests
        working-directory: ./automation
        run: npx playwright test

      # Debug generated files
      - name: Debug generated files
        if: always()
        run: |
          echo "===== execution-history ====="

          if [ -f automation/test-data/execution-history.json ]; then
            cat automation/test-data/execution-history.json
          else
            echo "execution-history.json not found"
          fi

          echo ""
          echo "===== comparison-data ====="

          if [ -f automation/test-data/comparison-data.json ]; then
            cat automation/test-data/comparison-data.json
          else
            echo "comparison-data.json not found"
          fi

      # Save history into repository
      - name: Commit execution history
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add automation/test-data/execution-history.json
          git add automation/test-data/comparison-data.json

          if ! git diff --staged --quiet; then
            git commit -m "Update execution history"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi

      # Upload Playwright report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: automation/playwright-report

      # Upload test results if failure
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: automation/test-results